{{ if .IsNamedParams }}
<div class="aside aside-{{ .Get "type" | default "note" }}">
  <h4>{{ .Get "title" | default "Note" }}</h4>
  <div class="body">
    {{ .Inner | .Page.RenderString }}
  </div>
</div>
{{ else }}
  <div class="aside aside-{{ .Get 0 | default "note" }}">
  {{ if len .Params | le 2 }}
    <h4>{{ .Get 1 }}</h4>
  {{ else }}
    <h4>{{ .Get 0 }}</h4>
  {{ end }}
  <div class="body">
    {{ .Inner | .Page.RenderString }}
  </div>
</div>
{{ end }}
